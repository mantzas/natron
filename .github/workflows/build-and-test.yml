name: build and test

on:
  push:
  pull_request:
    branches: [ main ]
    paths:
      - '**.cs'
      - '**.csproj'
      - 'Directory.Packages.props'

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest    

    steps:
      - uses: actions/checkout@v6

      - name: Start containers
        run: docker compose up -d

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x.x'

      - name: Install dependencies
        run: dotnet restore

      - name: Wait for containers to be ready
        run: |
          echo "Waiting for Moto..."
          timeout 60 bash -c 'until curl -sf http://127.0.0.1:5000/moto-api/ > /dev/null; do sleep 2; done'
          echo "Moto ready."
          echo "Waiting for Kafka..."
          timeout 120 bash -c 'until docker exec kafka kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1; do sleep 2; done'
          echo "Kafka ready."

      - name: Unit Tests
        run: dotnet test --filter Category=Unit --no-restore --verbosity quiet
        
      - name: Integration Tests
        run: dotnet test --filter Category=Integration --no-restore --verbosity quiet